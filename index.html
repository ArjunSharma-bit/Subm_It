<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subm_It</title>
    <link rel = "stylesheet" href="./styles.css">
</head>
<body>
    <main class="game-wrapper">
        <div class="form-container">
            <h2>Fast Forms</h2>
            <p>The One stop shop to fill <strong>Forms.</strong> We are the best in business, Filling <strong>Forms</strong> from 50 years.</p>
            <p>To Contact Us, Please fill out the Form below. it should only take a <strong>Minute....</strong></p>

            <form id="t-form">
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required placeholder="Enter your message here...."></textarea>
                </div>

                <button type="submit" id="evil-submit" class="phase-1-btn">Submit</button>
            </form>
        </div>
    </main>
    <div id= "win-screen" class="win-screen">
        <h1 id="win-message">Finally!</h1>
        <button id="retry-btn">Try Again!</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
